name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Trigger on pushes to your main branch
  workflow_dispatch: # Allows manual triggering from the Actions tab

permissions:
  contents: read  # Read source code
  pages: write  # Required to publish to Pages
  id-token: write   # Required for OIDC authentication

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Run build to create dist artifacts 
        run: |
          echo "Running make build..."
          make build 
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload contents of the dist directory
          path: 'dist' 

  deploy:
    needs: build 
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Debug - Show deployment info
        run: |
          echo "Deploying to GitHub Pages..."
          echo "Environment: ${{ github.event.environment }}"
          echo "Workflow run ID: ${{ github.run_id }}"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
